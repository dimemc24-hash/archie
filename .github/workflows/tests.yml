name: tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pytest fastapi httpx2
      - name: py_compile everything
        run: python -m py_compile $(git ls-files '*.py')
      - name: harness-control + plugin tests
        run: python -m pytest skills/harness-control/test_wrappers.py dashboard-plugins/test_plugin_apis.py console/test_console.py antiques/test_antiques.py test_stage2_dedupe.py test_stage2_speedometer.py port/test_credits.py -q
      - name: port suite (TZ-deterministic since run 2026-07-01-utc-day-ledger)
        run: |
          python port/test_port.py
          TZ=America/New_York python port/test_port.py
      # test_stage2_dedupe.py stays on-box only: importing stage2_build pulls in
      # fusion, which expects the droplet's ~/.hermes credentials.
